# Índice de base das janelas começando em 1
set -g base-index 1

# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Splits intuitivos
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Navegação vim
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload
bind r source-file ~/.tmux.conf \; display "Reloaded!"
unbind -T copy-mode-vi MouseDragEnd1Pane

# Mouse support
set -g mouse on

# Plugins 
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tpm'

# Configurações do Continuum
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

# Configuração manual do sessionx
set -g @sessionx-bind 'o'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-filter-current 'false'

# Status bar customizada - simples e limpo
set -g status-left ""
set -g status-right ""
set -g status-left-length 40
set -g status-right-length 40
set -ag status-left "#{E:@catppuccin_status_session}"

# Source tmux.conf
unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf recarregado"
run '~/.tmux/plugins/tpm/tpm'
 
# Barra de janelas sem ícones especiais (evita caracteres quebrados)
set -g status-style "bg=#{@thm_mantle},fg=#{@thm_subtext_0}"
# set -g window-status-separator " "
set -g window-status-format "#[fg=#{@thm_subtext_1},bg=#{@thm_surface_0}] #I:#W #[default]"
set -g window-status-current-format "#[fg=#{@thm_crust},bg=#{@thm_green},bold] #I:#W #[default]"
